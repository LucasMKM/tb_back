<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Empresa</title>
    <link rel="stylesheet" href="/TRABALHO_DE_BACK/css/login.css">
</head>
<body>
<nav>
    <a class="logo" href="/TRABALHO_DE_BACK/php/minhas_empresas.php">⬡ GestãoPro</a>
    <ul class="nav-links">
        <li><a href="/TRABALHO_DE_BACK/php/listar_clientes.php">👤 Clientes</a></li>
        <li><a href="/TRABALHO_DE_BACK/php/minhas_empresas.php" class="active">🏢 Minhas Empresas</a></li>
        <li><a href="/TRABALHO_DE_BACK/php/logout.php" style="color:var(--danger)">Sair</a></li>
    </ul>
</nav>

<div class="container">
    <div class="page-header">
        <h1>Nova <span>Empresa</span></h1>
        <a href="/TRABALHO_DE_BACK/php/listar_empresas.php" class="btn btn-secondary">← Voltar</a>
    </div>

    <div id="msg-container"></div>

    <div class="form-card">
        <form action="/TRABALHO_DE_BACK/php/inserir_empresa.php" method="post">
            <div class="form-group">
                <label>Nome da empresa</label>
                <input type="text" name="nome" placeholder="Ex: Tech Solutions Ltda" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Natureza Jurídica</label>
                    <select name="natureza_juridica" required>
                        <option value="">-- Selecione --</option>
                        <option value="MEI">MEI</option>
                        <option value="ME">ME</option>
                        <option value="EPP">EPP</option>
                        <option value="LTDA">LTDA</option>
                        <option value="S.A.">S.A.</option>
                        <option value="EIRELI">EIRELI</option>
                        <option value="SLU">SLU</option>
                        <option value="ONG">ONG</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Código Secreto <small style="text-transform:none;font-weight:400;color:var(--muted)">(3 caracteres)</small></label>
                    <input type="text" name="codigo_secreto" maxlength="3" minlength="3"
                           placeholder="Ex: A1B" style="font-family:'Space Mono',monospace;letter-spacing:4px;" required>
                </div>
            </div>
            <div class="form-group">
                <label>Endereço</label>
                <input type="text" name="endereco" placeholder="Ex: Rua das Flores, 123 – Porto Alegre/RS" required>
            </div>
            <div style="display:flex;gap:0.8rem;">
                <button type="submit" class="btn btn-primary">Cadastrar Empresa</button>
                <a href="/TRABALHO_DE_BACK/php/listar_empresas.php" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const container = document.getElementById('msg-container');
    if (params.get('erro')) {
        container.innerHTML = `<div class="alert alert-danger">${params.get('erro')}</div>`;
    }
</script>
</body>
</html>
